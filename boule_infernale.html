<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>La Boule Infernale</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
  }
  #title {
    color: #FFFF00;
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 4px;
    margin-bottom: 10px;
    text-shadow: 0 0 10px #FFFF00;
  }
  #hud {
    display: flex;
    gap: 40px;
    color: #FFFF00;
    font-size: 16px;
    margin-bottom: 6px;
    width: 800px;
    justify-content: space-between;
  }
  canvas {
    display: block;
    border: none;
  }
</style>
</head>
<body>
<div id="title">★ LA BOULE INFERNALE ★</div>
<div id="hud">
  <span>SCORE: <span id="scoreDisplay">0</span></span>
  <span>NIVEAU: <span id="levelDisplay">1</span></span>
  <span>TEMPS: <span id="timerDisplay">00:00</span></span>
</div>
<canvas id="gameCanvas" width="800" height="520"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

// ── Audio (Web Audio API — sons rétro années 80) ──────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playBounce() {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'square';
  o.frequency.setValueAtTime(480, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(240, audioCtx.currentTime + 0.08);
  g.gain.setValueAtTime(0.3, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
  o.start(); o.stop(audioCtx.currentTime + 0.1);
}

function playCollect() {
  [600, 800, 1000].forEach((freq, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'square';
    o.frequency.value = freq;
    g.gain.setValueAtTime(0.25, audioCtx.currentTime + i * 0.05);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.05 + 0.08);
    o.start(audioCtx.currentTime + i * 0.05);
    o.stop(audioCtx.currentTime + i * 0.05 + 0.09);
  });
}

function playDeath() {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(300, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.5);
  g.gain.setValueAtTime(0.4, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.55);
  o.start(); o.stop(audioCtx.currentTime + 0.6);
}

function playLevelUp() {
  [400, 500, 600, 800].forEach((freq, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'square';
    o.frequency.value = freq;
    g.gain.setValueAtTime(0.3, audioCtx.currentTime + i * 0.1);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.1 + 0.12);
    o.start(audioCtx.currentTime + i * 0.1);
    o.stop(audioCtx.currentTime + i * 0.1 + 0.13);
  });
}

// ── Constantes visuel ─────────────────────────────────────────────────────────
const BORDER = 20;       // épaisseur bordure
const TILE   = 10;       // taille tuile damier
const BALL_R = 7;
const WALL_W = 16;
const WALL_H = 16;
const TARGET_SIZE = 14;  // taille triangle

// Zone de jeu intérieure
const PLAY_X = BORDER;
const PLAY_Y = BORDER;
const PLAY_W = W - BORDER * 2;
const PLAY_H = H - BORDER * 2;

// ── État du jeu ───────────────────────────────────────────────────────────────
let state = 'waiting'; // waiting | playing | dead | scoreboard | entering_name
let score = 0;
let level = 1;
let totalTime = 0; // ms total joué
let timerStart = null;
let ball, walls, targets;
let highScores = JSON.parse(localStorage.getItem('bouleScores') || '[]');
let pendingScore = null;
let nameInput = '';
let flashTimer = 0;
let flashOn = true;

// ── Génération ────────────────────────────────────────────────────────────────
function randomPos(margin) {
  return {
    x: PLAY_X + margin + Math.random() * (PLAY_W - margin * 2),
    y: PLAY_Y + margin + Math.random() * (PLAY_H - margin * 2)
  };
}

function noOverlap(pos, list, minDist) {
  for (const o of list) {
    const dx = pos.x - o.x, dy = pos.y - o.y;
    if (Math.sqrt(dx*dx + dy*dy) < minDist) return false;
  }
  return true;
}

function generateLevel() {
  walls = [];
  targets = [];

  // 10 murs
  let tries = 0;
  while (walls.length < 10 && tries < 1000) {
    tries++;
    const p = randomPos(30);
    if (noOverlap(p, walls, 50)) walls.push(p);
  }

  // 10 cibles (triangles jaunes)
  tries = 0;
  while (targets.length < 10 && tries < 1000) {
    tries++;
    const p = randomPos(30);
    if (noOverlap(p, walls, 40) && noOverlap(p, targets, 40)) targets.push(p);
  }

  // Boule — position aléatoire, loin des murs
  let ballPos;
  tries = 0;
  do {
    ballPos = randomPos(40);
    tries++;
  } while (!noOverlap(ballPos, walls, 50) && tries < 500);

  const speed = 3 + level * 0.3;
  ball = {
    x: ballPos.x, y: ballPos.y,
    dx: (Math.random() > 0.5 ? 1 : -1) * speed, dy: 0,
    r: BALL_R
  };
}

function initGame() {
  score = 0;
  level = 1;
  totalTime = 0;
  timerStart = null;
  nameInput = '';
  generateLevel();
  state = 'waiting';
  updateHUD();
}

// ── Dessin bordure damier ─────────────────────────────────────────────────────
function drawBorder() {
  const cols = Math.ceil(W / TILE);
  const rows = Math.ceil(H / TILE);
  for (let c = 0; c < cols; c++) {
    for (let r = 0; r < rows; r++) {
      const inPlay = (
        c * TILE >= BORDER && (c+1) * TILE <= W - BORDER &&
        r * TILE >= BORDER && (r+1) * TILE <= H - BORDER
      );
      if (!inPlay) {
        ctx.fillStyle = ((c + r) % 2 === 0) ? '#FFFF00' : '#000000';
        ctx.fillRect(c * TILE, r * TILE, TILE, TILE);
      }
    }
  }
}

// ── Dessin mur (bloc vert 3x3 pixels-art) ────────────────────────────────────
function drawWall(wx, wy) {
  // Grille 3x3 de petits carrés verts comme sur le screenshot
  const cell = 5;
  const gap = 1;
  const cols = 3, rows = 3;
  const totalW = cols * cell + (cols - 1) * gap;
  const totalH = rows * cell + (rows - 1) * gap;
  const ox = wx - totalW / 2;
  const oy = wy - totalH / 2;
  ctx.fillStyle = '#00CC44';
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      ctx.fillRect(ox + c * (cell + gap), oy + r * (cell + gap), cell, cell);
    }
  }
}

// ── Dessin cible clef jaune (pixel-art CPC) ───────────────────────────────────
function drawTarget(tx, ty) {
  const s = 2; // taille d'un pixel
  ctx.fillStyle = '#FFFF00';
  // Clef pixel-art 7x9 pixels, centrée sur (tx, ty)
  // Anneau de la clef (haut)
  const ring = [
    [1,0],[2,0],[3,0],
    [0,1],[4,1],
    [0,2],[4,2],
    [1,3],[2,3],[3,3],
    // tige
    [2,4],[2,5],[2,6],
    // dents
    [2,7],[3,7],
    [2,8]
  ];
  const offX = tx - 4 * s;
  const offY = ty - 4 * s;
  for (const [c, r] of ring) {
    ctx.fillRect(offX + c * s, offY + r * s, s, s);
  }
}

// ── Dessin boule ──────────────────────────────────────────────────────────────
function drawBall() {
  ctx.fillStyle = '#FFFF00';
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fill();
  // petit reflet rétro
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.arc(ball.x - 2, ball.y - 2, 2, 0, Math.PI * 2);
  ctx.fill();
}

// ── HUD ───────────────────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('levelDisplay').textContent = level;
}

function formatTime(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  return String(m).padStart(2,'0') + ':' + String(s % 60).padStart(2,'0');
}

// ── Collision balle/mur (AABB) ────────────────────────────────────────────────
function circleRect(cx, cy, cr, rx, ry, rw, rh) {
  const nearX = Math.max(rx, Math.min(cx, rx + rw));
  const nearY = Math.max(ry, Math.min(cy, ry + rh));
  const dx = cx - nearX, dy = cy - nearY;
  return dx * dx + dy * dy < cr * cr;
}

const DY_ACTIVE = 2.5; // vitesse verticale pendant appui

let keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') {
    e.preventDefault();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (state === 'waiting') {
      state = 'playing';
      timerStart = performance.now();
    }
  }
  if (e.code === 'ArrowUp' || e.code === 'ArrowDown') e.preventDefault();
  if (state === 'entering_name') {
    e.preventDefault();
    if (e.code === 'Enter' && nameInput.length > 0) {
      saveScore(nameInput);
      nameInput = '';
      state = 'scoreboard';
    } else if (e.code === 'Backspace') {
      nameInput = nameInput.slice(0, -1);
    } else if (e.key.length === 1 && nameInput.length < 12) {
      nameInput += e.key.toUpperCase();
    }
  }
  if (state === 'scoreboard' && e.code === 'Space') {
    e.preventDefault();
    initGame();
  }
});
document.addEventListener('keyup', e => {
  keys[e.code] = false;
  // Dès que la flèche est relâchée → retour horizontal pur
  if (e.code === 'ArrowUp' || e.code === 'ArrowDown') {
    ball.dy = 0;
  }
});

function update(now) {
  if (state !== 'playing') return;

  // Chrono
  totalTime += now - timerStart;
  timerStart = now;
  document.getElementById('timerDisplay').textContent = formatTime(totalTime);

  // Touche enfoncée → dy actif ; relâchée → dy = 0
  if (keys['ArrowUp'])        ball.dy = -DY_ACTIVE;
  else if (keys['ArrowDown']) ball.dy =  DY_ACTIVE;
  // (si aucune touche : dy reste 0, déjà remis à 0 au keyup)

  ball.x += ball.dx;
  ball.y += ball.dy;

  // Rebond bords de la zone de jeu
  if (ball.x - ball.r <= PLAY_X) { ball.x = PLAY_X + ball.r; ball.dx = Math.abs(ball.dx); playBounce(); }
  if (ball.x + ball.r >= PLAY_X + PLAY_W) { ball.x = PLAY_X + PLAY_W - ball.r; ball.dx = -Math.abs(ball.dx); playBounce(); }
  if (ball.y - ball.r <= PLAY_Y) { ball.y = PLAY_Y + ball.r; ball.dy = Math.abs(ball.dy); playBounce(); }
  if (ball.y + ball.r >= PLAY_Y + PLAY_H) { ball.y = PLAY_Y + PLAY_H - ball.r; ball.dy = -Math.abs(ball.dy); playBounce(); }

  // Collision murs → game over
  for (const w of walls) {
    if (circleRect(ball.x, ball.y, ball.r, w.x - WALL_W/2, w.y - WALL_H/2, WALL_W, WALL_H)) {
      playDeath();
      state = 'dead';
      pendingScore = { score, time: totalTime };
      checkHighScore();
      return;
    }
  }

  // Collision cibles
  for (let i = targets.length - 1; i >= 0; i--) {
    const t = targets[i];
    const dx = ball.x - t.x, dy = ball.y - t.y;
    if (Math.sqrt(dx*dx + dy*dy) < ball.r + TARGET_SIZE / 2) {
      targets.splice(i, 1);
      score++;
      updateHUD();
      // Inversion horizontale uniquement — retour horizontal pur
      ball.dx = -ball.dx;
      ball.dy = 0;
      playCollect();
    }
  }

  // Niveau suivant
  if (targets.length === 0) {
    level++;
    playLevelUp();
    generateLevel();
    state = 'waiting';
    updateHUD();
  }
}

// ── Scores ────────────────────────────────────────────────────────────────────
function checkHighScore() {
  if (highScores.length < 10 || isTopTen()) {
    state = 'entering_name';
  } else {
    state = 'scoreboard';
  }
}

function isTopTen() {
  if (highScores.length < 10) return true;
  const worst = highScores[9];
  if (score > worst.score) return true;
  if (score === worst.score && totalTime < worst.time) return true;
  return false;
}

function saveScore(name) {
  highScores.push({ name, score, time: totalTime });
  highScores.sort((a, b) => {
    if (b.score !== a.score) return b.score - a.score;
    return a.time - b.time;
  });
  highScores = highScores.slice(0, 10);
  localStorage.setItem('bouleScores', JSON.stringify(highScores));
}

// ── Rendu ─────────────────────────────────────────────────────────────────────
function draw(now) {
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, W, H);

  drawBorder();

  // Fond zone jeu
  ctx.fillStyle = '#000000';
  ctx.fillRect(PLAY_X, PLAY_Y, PLAY_W, PLAY_H);

  if (state === 'scoreboard') {
    drawScoreboard();
    return;
  }

  // Murs
  for (const w of walls) drawWall(w.x, w.y);
  // Cibles
  for (const t of targets) drawTarget(t.x, t.y);
  // Boule
  drawBall();

  if (state === 'waiting') {
    drawWaitingMessage(now);
  }

  if (state === 'entering_name') {
    drawNameInput();
  }
}

function drawWaitingMessage(now) {
  // Flash "ESPACE POUR DEMARRER"
  flashTimer += 16;
  if (flashTimer > 500) { flashOn = !flashOn; flashTimer = 0; }

  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(PLAY_X + 80, PLAY_Y + PLAY_H/2 - 30, PLAY_W - 160, 60);

  if (flashOn) {
    ctx.fillStyle = '#FFFF00';
    ctx.font = 'bold 20px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText('◄ ESPACE POUR DÉMARRER ►', W / 2, PLAY_Y + PLAY_H / 2 + 7);
  }
}

function drawNameInput() {
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(PLAY_X + 60, PLAY_Y + PLAY_H/2 - 70, PLAY_W - 120, 140);
  ctx.strokeStyle = '#FFFF00';
  ctx.lineWidth = 2;
  ctx.strokeRect(PLAY_X + 60, PLAY_Y + PLAY_H/2 - 70, PLAY_W - 120, 140);

  ctx.fillStyle = '#FFFF00';
  ctx.font = 'bold 18px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText('NOUVEAU RECORD !', W/2, PLAY_Y + PLAY_H/2 - 35);
  ctx.fillText(`SCORE: ${score}  TEMPS: ${formatTime(totalTime)}`, W/2, PLAY_Y + PLAY_H/2 - 10);

  ctx.fillStyle = '#00CC44';
  ctx.font = '15px "Courier New"';
  ctx.fillText('ENTREZ VOTRE NOM:', W/2, PLAY_Y + PLAY_H/2 + 18);

  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 22px "Courier New"';
  ctx.fillText(nameInput + (Math.floor(Date.now()/500)%2===0 ? '▌' : ' '), W/2, PLAY_Y + PLAY_H/2 + 48);

  ctx.fillStyle = '#888';
  ctx.font = '13px "Courier New"';
  ctx.fillText('[ ENTRÉE pour valider ]', W/2, PLAY_Y + PLAY_H/2 + 72);
}

function drawScoreboard() {
  ctx.fillStyle = '#000000';
  ctx.fillRect(PLAY_X, PLAY_Y, PLAY_W, PLAY_H);

  // Titre
  ctx.fillStyle = '#FFFF00';
  ctx.font = 'bold 24px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText('★ TABLEAU DES SCORES ★', W/2, PLAY_Y + 40);

  // Colonnes
  ctx.fillStyle = '#00CC44';
  ctx.font = 'bold 14px "Courier New"';
  ctx.textAlign = 'left';
  const startX = PLAY_X + 40;
  ctx.fillText('RANG', startX, PLAY_Y + 75);
  ctx.fillText('NOM', startX + 80, PLAY_Y + 75);
  ctx.fillText('SCORE', startX + 260, PLAY_Y + 75);
  ctx.fillText('TEMPS', startX + 360, PLAY_Y + 75);

  ctx.strokeStyle = '#FFFF00';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(startX, PLAY_Y + 82); ctx.lineTo(PLAY_W - 10, PLAY_Y + 82);
  ctx.stroke();

  highScores.forEach((s, i) => {
    const y = PLAY_Y + 105 + i * 32;
    const isNew = pendingScore && s.score === pendingScore.score && s.time === pendingScore.time && s.name === nameInput;
    ctx.fillStyle = i === 0 ? '#FFFF00' : (isNew ? '#00FF88' : '#FFFFFF');
    ctx.font = (i < 3 ? 'bold' : '') + ' 14px "Courier New"';
    ctx.textAlign = 'left';
    const medal = ['①', '②', '③'][i] || `${i+1}.`;
    ctx.fillText(medal, startX, y);
    ctx.fillText(s.name.substring(0, 12), startX + 80, y);
    ctx.fillText(String(s.score).padStart(3, ' '), startX + 260, y);
    ctx.fillText(formatTime(s.time), startX + 360, y);
  });

  if (highScores.length === 0) {
    ctx.fillStyle = '#888';
    ctx.font = '16px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText('— aucun score enregistré —', W/2, PLAY_Y + PLAY_H/2);
  }

  // Flash espace
  flashTimer += 16;
  if (flashTimer > 600) { flashOn = !flashOn; flashTimer = 0; }
  if (flashOn) {
    ctx.fillStyle = '#FFFF00';
    ctx.font = 'bold 15px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText('ESPACE pour rejouer', W/2, PLAY_Y + PLAY_H - 20);
  }
}

// ── Boucle principale ─────────────────────────────────────────────────────────
function loop(now) {
  update(now);
  draw(now);
  requestAnimationFrame(loop);
}

initGame();
requestAnimationFrame(loop);
</script>
</body>
</html>
