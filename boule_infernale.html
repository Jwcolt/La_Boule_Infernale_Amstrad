<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>La Boule Infernale</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  #hud {
    display: flex;
    gap: 40px;
    color: #FFFF00;
    font-size: 16px;
    margin-bottom: 6px;
    width: 800px;
    justify-content: space-between;
  }
  canvas { display: block; border: none; }
</style>
</head>
<body>
<div id="hud" style="visibility:hidden">
  <span>SCORE: <span id="scoreDisplay">0</span></span>
  <span>NIVEAU: <span id="levelDisplay">1</span></span>
  <span>TEMPS: <span id="timerDisplay">00:00</span></span>
</div>
<canvas id="gameCanvas" width="800" height="520"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ═══════════════════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════════════════
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playBounce() {
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'square';
  o.frequency.setValueAtTime(480, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(240, audioCtx.currentTime + 0.08);
  g.gain.setValueAtTime(0.25, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
  o.start(); o.stop(audioCtx.currentTime + 0.1);
}

function playCollect() {
  [600, 800, 1000].forEach((freq, i) => {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'square'; o.frequency.value = freq;
    g.gain.setValueAtTime(0.2, audioCtx.currentTime + i*0.05);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i*0.05 + 0.08);
    o.start(audioCtx.currentTime + i*0.05);
    o.stop(audioCtx.currentTime + i*0.05 + 0.09);
  });
}

function playDeath() {
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(300, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.6);
  g.gain.setValueAtTime(0.4, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.65);
  o.start(); o.stop(audioCtx.currentTime + 0.7);
}

function playLevelUp() {
  [400, 500, 600, 800].forEach((freq, i) => {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'square'; o.frequency.value = freq;
    g.gain.setValueAtTime(0.25, audioCtx.currentTime + i*0.1);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i*0.1 + 0.12);
    o.start(audioCtx.currentTime + i*0.1);
    o.stop(audioCtx.currentTime + i*0.1 + 0.13);
  });
}

// Musique fond arcade 80s — mélodie type Galaga en boucle
const MUSIC = [
  523,659,784,659,523,440,494,523,
  659,784,880,784,659,523,494,440,
  392,494,587,494,392,330,370,392,
  494,587,659,587,494,392,370,330
];
let musicIdx = 0, musicOn = false, musicTid = null;

function startMusic() {
  if (musicOn) return;
  musicOn = true;
  nextNote();
}

function stopMusic() {
  musicOn = false;
  if (musicTid) { clearTimeout(musicTid); musicTid = null; }
}

function nextNote() {
  if (!musicOn) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'square';
  o.frequency.value = MUSIC[musicIdx++ % MUSIC.length];
  g.gain.setValueAtTime(0.07, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.13);
  o.start(); o.stop(audioCtx.currentTime + 0.14);
  musicTid = setTimeout(nextNote, 155);
}

// ═══════════════════════════════════════════════════════════
// CONSTANTES
// ═══════════════════════════════════════════════════════════
const BORDER = 20, TILE = 10, BALL_R = 7;
const WALL_W = 18, WALL_H = 18, TARGET_SIZE = 14;
const PLAY_X = BORDER, PLAY_Y = BORDER;
const PLAY_W = W - BORDER*2, PLAY_H = H - BORDER*2;
const BASE_SPEED = 3.2, SPEED_INC = 0.15, DY_ACTIVE = 2.5;

// ═══════════════════════════════════════════════════════════
// ÉTAT
// ═══════════════════════════════════════════════════════════
let state = 'title';
let score = 0, level = 1, totalTime = 0, timerStart = null;
let ball, walls, targets;
let highScores = JSON.parse(localStorage.getItem('bouleScores') || '[]');
let pendingScore = null, nameInput = '';
let flash = true, flashTimer = 0;
let keys = {};
// Boule animée sur écrans titre/règles
let tb = { x: 580, y: 300, dx: 2.5, dy: 1.8, r: 38 };

// ═══════════════════════════════════════════════════════════
// GÉNÉRATION
// ═══════════════════════════════════════════════════════════
function rndPos(m) {
  return { x: PLAY_X+m+Math.random()*(PLAY_W-m*2), y: PLAY_Y+m+Math.random()*(PLAY_H-m*2) };
}
function noOvlp(p, list, d) {
  return list.every(o => { const dx=p.x-o.x,dy=p.y-o.y; return Math.sqrt(dx*dx+dy*dy)>=d; });
}
function levelSpeed() { return BASE_SPEED * Math.pow(1+SPEED_INC, level-1); }

function generateLevel() {
  walls=[]; targets=[];
  let t=0;
  while(walls.length<10&&t++<1000){ const p=rndPos(35); if(noOvlp(p,walls,55)) walls.push(p); }
  t=0;
  while(targets.length<10&&t++<1000){ const p=rndPos(35); if(noOvlp(p,walls,45)&&noOvlp(p,targets,45)) targets.push(p); }
  let bp; t=0;
  do { bp=rndPos(50); t++; } while(!noOvlp(bp,walls,60)&&t<500);
  const spd=levelSpeed();
  ball={ x:bp.x, y:bp.y, dx:(Math.random()>.5?1:-1)*spd, dy:0, r:BALL_R };
}

function initGame() {
  score=0; level=1; totalTime=0; timerStart=null; nameInput='';
  generateLevel();
  state='waiting';
  document.getElementById('hud').style.visibility='visible';
  updHUD();
}

function updHUD() {
  document.getElementById('scoreDisplay').textContent=score;
  document.getElementById('levelDisplay').textContent=level;
}

function fmtTime(ms) {
  const s=Math.floor(ms/1000),m=Math.floor(s/60);
  return String(m).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
}

// ═══════════════════════════════════════════════════════════
// CLAVIER
// ═══════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  keys[e.code]=true;
  if(['Space','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
  if(audioCtx.state==='suspended') audioCtx.resume();

  if(state==='title' && e.code==='Space') { state='rules'; return; }

  if(state==='rules' && e.code==='Space') { stopMusic(); initGame(); return; }

  if(state==='waiting' && e.code==='Space') {
    state='playing'; timerStart=performance.now(); return;
  }

  if(state==='entering_name') {
    if(e.code==='Enter' && nameInput.length>0) { saveScore(nameInput); nameInput=''; state='scoreboard'; }
    else if(e.code==='Backspace') nameInput=nameInput.slice(0,-1);
    else if(e.key.length===1 && nameInput.length<12) nameInput+=e.key.toUpperCase();
    return;
  }

  if(state==='scoreboard') {
    if(e.code==='Space') { initGame(); return; }
    if(e.code==='Escape') {
      document.getElementById('hud').style.visibility='hidden';
      state='title'; startMusic(); return;
    }
  }
});

document.addEventListener('keyup', e => {
  keys[e.code]=false;
  if((e.code==='ArrowUp'||e.code==='ArrowDown') && ball) ball.dy=0;
});

// ═══════════════════════════════════════════════════════════
// PHYSIQUE
// ═══════════════════════════════════════════════════════════
function circRect(cx,cy,cr,rx,ry,rw,rh) {
  const nx=Math.max(rx,Math.min(cx,rx+rw)), ny=Math.max(ry,Math.min(cy,ry+rh));
  const dx=cx-nx,dy=cy-ny; return dx*dx+dy*dy<cr*cr;
}

function update(now) {
  // Boule animée titre/règles
  if(state==='title'||state==='rules') {
    tb.x+=tb.dx; tb.y+=tb.dy;
    if(tb.x-tb.r<0||tb.x+tb.r>W) tb.dx*=-1;
    if(tb.y-tb.r<0||tb.y+tb.r>H) tb.dy*=-1;
  }

  if(state!=='playing') return;

  totalTime+=now-timerStart; timerStart=now;
  document.getElementById('timerDisplay').textContent=fmtTime(totalTime);

  if(keys['ArrowUp'])        ball.dy=-DY_ACTIVE;
  else if(keys['ArrowDown']) ball.dy= DY_ACTIVE;

  ball.x+=ball.dx; ball.y+=ball.dy;

  if(ball.x-ball.r<=PLAY_X)          { ball.x=PLAY_X+ball.r;          ball.dx= Math.abs(ball.dx); playBounce(); }
  if(ball.x+ball.r>=PLAY_X+PLAY_W)   { ball.x=PLAY_X+PLAY_W-ball.r;   ball.dx=-Math.abs(ball.dx); playBounce(); }
  if(ball.y-ball.r<=PLAY_Y)          { ball.y=PLAY_Y+ball.r;           ball.dy= Math.abs(ball.dy); playBounce(); }
  if(ball.y+ball.r>=PLAY_Y+PLAY_H)   { ball.y=PLAY_Y+PLAY_H-ball.r;   ball.dy=-Math.abs(ball.dy); playBounce(); }

  for(const w of walls) {
    if(circRect(ball.x,ball.y,ball.r, w.x-WALL_W/2,w.y-WALL_H/2,WALL_W,WALL_H)) {
      playDeath(); pendingScore={score,time:totalTime}; checkHS(); return;
    }
  }

  for(let i=targets.length-1;i>=0;i--) {
    const t=targets[i], dx=ball.x-t.x, dy=ball.y-t.y;
    if(Math.sqrt(dx*dx+dy*dy)<ball.r+TARGET_SIZE/2) {
      targets.splice(i,1); score++; updHUD();
      ball.dx=-ball.dx; ball.dy=0; playCollect();
    }
  }

  if(targets.length===0) { level++; playLevelUp(); generateLevel(); state='waiting'; updHUD(); }
}

// ═══════════════════════════════════════════════════════════
// SCORES
// ═══════════════════════════════════════════════════════════
function isTop10() {
  if(highScores.length<10) return true;
  const w=highScores[9];
  return score>w.score || (score===w.score && totalTime<w.time);
}
function checkHS() { state=isTop10()?'entering_name':'scoreboard'; }
function saveScore(name) {
  highScores.push({name,score,time:totalTime});
  highScores.sort((a,b)=>b.score!==a.score?b.score-a.score:a.time-b.time);
  highScores=highScores.slice(0,10);
  localStorage.setItem('bouleScores',JSON.stringify(highScores));
}

// ═══════════════════════════════════════════════════════════
// DESSIN — UTILITAIRES
// ═══════════════════════════════════════════════════════════
function drawBorder() {
  const cols=Math.ceil(W/TILE), rows=Math.ceil(H/TILE);
  for(let c=0;c<cols;c++) for(let r=0;r<rows;r++) {
    const inside=(c*TILE>=BORDER&&(c+1)*TILE<=W-BORDER&&r*TILE>=BORDER&&(r+1)*TILE<=H-BORDER);
    if(!inside){ ctx.fillStyle=((c+r)%2===0)?'#FFFF00':'#000'; ctx.fillRect(c*TILE,r*TILE,TILE,TILE); }
  }
}

function drawWall(wx,wy) {
  const cell=5,gap=1, ox=wx-(3*cell+2*gap)/2, oy=wy-(3*cell+2*gap)/2;
  ctx.fillStyle='#00CC44';
  for(let r=0;r<3;r++) for(let c=0;c<3;c++)
    ctx.fillRect(ox+c*(cell+gap), oy+r*(cell+gap), cell, cell);
}

function drawKey(tx,ty) {
  const s=2; ctx.fillStyle='#FFFF00';
  [[1,0],[2,0],[3,0],[0,1],[4,1],[0,2],[4,2],[1,3],[2,3],[3,3],
   [2,4],[2,5],[2,6],[2,7],[3,7],[2,8]
  ].forEach(([c,r])=>ctx.fillRect(tx-4*s+c*s, ty-4*s+r*s, s, s));
}

function drawGameBall() {
  ctx.fillStyle='#FFFF00';
  ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#FFF';
  ctx.beginPath(); ctx.arc(ball.x-2,ball.y-2,2,0,Math.PI*2); ctx.fill();
}

// Boule rouge infernale (écrans titre/règles)
function drawDemonBall(bx,by,br) {
  // Ombre portée
  ctx.fillStyle='rgba(160,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(bx+5,by+br*0.8,br*0.85,br*0.35,0,0,Math.PI*2); ctx.fill();
  // Corps gradient
  const gr=ctx.createRadialGradient(bx-br*0.3,by-br*0.3,br*0.05,bx,by,br);
  gr.addColorStop(0,'#FF5555'); gr.addColorStop(0.55,'#CC0000'); gr.addColorStop(1,'#7A0000');
  ctx.fillStyle=gr;
  ctx.beginPath(); ctx.arc(bx,by,br,0,Math.PI*2); ctx.fill();
  // Yeux plissés (style CPC original)
  ctx.fillStyle='#000';
  ctx.fillRect(bx-14,by-7,11,4);
  ctx.fillRect(bx+3, by-7,11,4);
  // Petites dents bleues (style screenshot)
  ctx.fillStyle='#4488FF';
  ctx.fillRect(bx-6,by+7,4,6);
  ctx.fillRect(bx+2,by+7,4,6);
  // Reflet
  ctx.fillStyle='rgba(255,255,255,0.22)';
  ctx.beginPath(); ctx.ellipse(bx-br*0.32,by-br*0.3,br*0.28,br*0.16,-0.5,0,Math.PI*2); ctx.fill();
}

// Flash clignotant
function tickFlash(interval=500) {
  flashTimer+=16;
  if(flashTimer>interval){ flash=!flash; flashTimer=0; }
}

// ═══════════════════════════════════════════════════════════
// ÉCRAN TITRE
// ═══════════════════════════════════════════════════════════
function drawTitle() {
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);

  // Boule animée
  drawDemonBall(tb.x, tb.y, tb.r);

  // Ligne décorative bleue
  ctx.strokeStyle='#0055CC'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(70,190); ctx.lineTo(W-70,190); ctx.stroke();

  // Titre principal
  ctx.textAlign='center';
  // Ombre
  ctx.fillStyle='#002266'; ctx.font='bold 50px "Courier New"';
  ctx.fillText('LA  BOULE  INFERNALE', W/2+3, 168+3);
  // Texte
  ctx.fillStyle='#3399FF'; ctx.font='bold 50px "Courier New"';
  ctx.fillText('LA  BOULE  INFERNALE', W/2, 168);

  // Sous-titre
  ctx.fillStyle='#CC2200'; ctx.font='bold 20px "Courier New"';
  ctx.fillText('THE  CRAZY  BALL', W/2, 220);

  // Flash instruction
  tickFlash(500);
  if(flash) {
    ctx.fillStyle='#CC0000'; ctx.font='bold 17px "Courier New"';
    ctx.fillText('< ESPACE > POUR JOUER', W/2, H-50);
  }

  // Crédits
  ctx.fillStyle='#333'; ctx.font='12px "Courier New"';
  ctx.fillText('Inspired by HEBDOGICIEL  ·  AMSTRAD CPC  ·  1980s', W/2, H-22);
}

// ═══════════════════════════════════════════════════════════
// ÉCRAN RÈGLES
// ═══════════════════════════════════════════════════════════
function drawRules() {
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);

  // Petite boule animée en haut à droite
  drawDemonBall(tb.x, tb.y, 28);

  ctx.textAlign='center';
  ctx.fillStyle='#3399FF'; ctx.font='bold 24px "Courier New"';
  ctx.fillText('★  RÈGLES  /  RULES  ★', W/2, 38);

  ctx.strokeStyle='#3399FF'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(50,50); ctx.lineTo(W-50,50); ctx.stroke();

  const L=32, cFR=30, cEN=W/2+8;
  let y=72;

  ctx.fillStyle='#FFFF00'; ctx.textAlign='left'; ctx.font='bold 13px "Courier New"';
  ctx.fillText('🇫🇷  FRANÇAIS', cFR, y);
  ctx.fillText('🇬🇧  ENGLISH',  cEN, y);
  y+=10;
  ctx.strokeStyle='#333';
  ctx.beginPath(); ctx.moveTo(cFR,y); ctx.lineTo(W/2-8,y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cEN,y); ctx.lineTo(W-28,y); ctx.stroke();
  y+=18;

  const rows=[
    ['OBJECTIF','OBJECTIVE',true],
    ['Collecter 10 clefs jaunes','Collect 10 yellow keys',false],
    ['sans toucher les blocs verts.','without hitting green blocks.',false],
    ['','',false],
    ['CONTRÔLES','CONTROLS',true],
    ['ESPACE — Lancer la boule','SPACE — Launch the ball',false],
    ['↑ maintenu — Monter','↑ hold — Move up',false],
    ['↓ maintenu — Descendre','↓ hold — Move down',false],
    ['Relâcher — retour horizontal','Release — back horizontal',false],
    ['','',false],
    ['RÈGLES','RULES',true],
    ['• 1 seule vie','• 1 life only',false],
    ['• Clef touchée → inversion +1pt','• Key hit → reversal +1pt',false],
    ['• Bloc vert → GAME OVER','• Green block → GAME OVER',false],
    ['• Vitesse +15% par niveau','• Speed +15% per level',false],
    ['','',false],
    ['SCORES','HIGH SCORES',true],
    ['Top 10 — score puis temps','Top 10 — score then time',false],
  ];

  for(const [fr,en,sec] of rows) {
    if(y>H-52) break;
    ctx.fillStyle = sec ? '#00CC44' : '#DDD';
    ctx.font = (sec ? 'bold ' : '') + '13px "Courier New"';
    ctx.textAlign='left';
    if(fr) ctx.fillText(fr, cFR, y);
    if(en) ctx.fillText(en, cEN, y);
    y += L;
  }

  ctx.strokeStyle='#3399FF'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(50,H-46); ctx.lineTo(W-50,H-46); ctx.stroke();

  tickFlash(480);
  if(flash) {
    ctx.fillStyle='#FFFF00'; ctx.textAlign='center'; ctx.font='bold 15px "Courier New"';
    ctx.fillText('◄  ESPACE POUR COMMENCER  /  SPACE TO START  ►', W/2, H-20);
  }
}

// ═══════════════════════════════════════════════════════════
// ÉCRAN JEU (waiting + playing)
// ═══════════════════════════════════════════════════════════
function drawGameScreen() {
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  drawBorder();
  ctx.fillStyle='#000'; ctx.fillRect(PLAY_X,PLAY_Y,PLAY_W,PLAY_H);
  walls.forEach(w=>drawWall(w.x,w.y));
  targets.forEach(t=>drawKey(t.x,t.y));
  drawGameBall();

  if(state==='waiting') {
    tickFlash(500);
    ctx.fillStyle='rgba(0,0,0,0.65)';
    ctx.fillRect(PLAY_X+55, PLAY_Y+PLAY_H/2-32, PLAY_W-110, 64);
    if(flash) {
      ctx.fillStyle='#FFFF00'; ctx.textAlign='center'; ctx.font='bold 19px "Courier New"';
      ctx.fillText('◄  ESPACE POUR DÉMARRER  ►', W/2, PLAY_Y+PLAY_H/2+3);
    }
    // Info vitesse
    ctx.fillStyle='#00CC44'; ctx.font='12px "Courier New"'; ctx.textAlign='center';
    const mult=(levelSpeed()/BASE_SPEED).toFixed(2);
    ctx.fillText(`NIVEAU ${level}  —  VITESSE ×${mult}`, W/2, PLAY_Y+PLAY_H/2+38);
  }
}

// ═══════════════════════════════════════════════════════════
// SAISIE NOM
// ═══════════════════════════════════════════════════════════
function drawNameInput() {
  drawGameScreen();
  const bx=PLAY_X+50, bw=PLAY_W-100, by=PLAY_Y+PLAY_H/2-85, bh=170;
  ctx.fillStyle='rgba(0,0,0,0.9)'; ctx.fillRect(bx,by,bw,bh);
  ctx.strokeStyle='#FFFF00'; ctx.lineWidth=2; ctx.strokeRect(bx,by,bw,bh);

  ctx.textAlign='center';
  ctx.fillStyle='#FFFF00'; ctx.font='bold 20px "Courier New"';
  ctx.fillText('★  NOUVEAU RECORD !  ★', W/2, by+34);
  ctx.fillStyle='#FFF'; ctx.font='14px "Courier New"';
  ctx.fillText(`SCORE: ${score}   TEMPS: ${fmtTime(totalTime)}`, W/2, by+60);
  ctx.fillStyle='#00CC44'; ctx.font='13px "Courier New"';
  ctx.fillText('ENTREZ VOTRE NOM / ENTER YOUR NAME:', W/2, by+88);
  ctx.fillStyle='#FFF'; ctx.font='bold 26px "Courier New"';
  ctx.fillText(nameInput+(Math.floor(Date.now()/500)%2===0?'▌':' '), W/2, by+126);
  ctx.fillStyle='#777'; ctx.font='12px "Courier New"';
  ctx.fillText('[ ENTRÉE pour valider ]', W/2, by+154);
}

// ═══════════════════════════════════════════════════════════
// SCOREBOARD
// ═══════════════════════════════════════════════════════════
function drawScoreboard() {
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  drawBorder();
  ctx.fillStyle='#000'; ctx.fillRect(PLAY_X,PLAY_Y,PLAY_W,PLAY_H);

  ctx.textAlign='center';
  ctx.fillStyle='#FFFF00'; ctx.font='bold 26px "Courier New"';
  ctx.fillText('★  TABLEAU DES SCORES  ★', W/2, PLAY_Y+38);

  ctx.strokeStyle='#FFFF00'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(PLAY_X+25,PLAY_Y+50); ctx.lineTo(PLAY_X+PLAY_W-25,PLAY_Y+50); ctx.stroke();

  const sx=PLAY_X+38;
  ctx.fillStyle='#00CC44'; ctx.font='bold 13px "Courier New"'; ctx.textAlign='left';
  ['RANG','NOM','SCORE','TEMPS'].forEach((h,i)=>
    ctx.fillText(h, sx+[0,75,275,375][i], PLAY_Y+68)
  );
  ctx.beginPath(); ctx.moveTo(sx,PLAY_Y+75); ctx.lineTo(PLAY_X+PLAY_W-25,PLAY_Y+75); ctx.stroke();

  highScores.forEach((s,i)=>{
    const y=PLAY_Y+98+i*30;
    const isNew=pendingScore&&s.score===pendingScore.score&&s.time===pendingScore.time;
    ctx.fillStyle=i===0?'#FFFF00':isNew?'#00FF88':'#FFF';
    ctx.font=(i<3?'bold ':'')+' 14px "Courier New"'; ctx.textAlign='left';
    ctx.fillText(['①','②','③'][i]??`${i+1}.`, sx, y);
    ctx.fillText(s.name.substring(0,12), sx+75, y);
    ctx.fillText(String(s.score).padStart(3,' '), sx+275, y);
    ctx.fillText(fmtTime(s.time), sx+375, y);
  });

  if(!highScores.length){
    ctx.fillStyle='#555'; ctx.font='16px "Courier New"'; ctx.textAlign='center';
    ctx.fillText('— aucun score enregistré —', W/2, PLAY_Y+PLAY_H/2);
  }

  tickFlash(550);
  if(flash){
    ctx.fillStyle='#FFFF00'; ctx.textAlign='center'; ctx.font='bold 14px "Courier New"';
    ctx.fillText('ESPACE = Rejouer   |   ÉCHAP = Quitter', W/2, PLAY_Y+PLAY_H-16);
  }
}

// ═══════════════════════════════════════════════════════════
// BOUCLE
// ═══════════════════════════════════════════════════════════
function loop(now) {
  update(now);
  switch(state) {
    case 'title':         drawTitle();       break;
    case 'rules':         drawRules();       break;
    case 'waiting':
    case 'playing':       drawGameScreen();  break;
    case 'entering_name': drawNameInput();   break;
    case 'scoreboard':    drawScoreboard();  break;
  }
  requestAnimationFrame(loop);
}

startMusic();
requestAnimationFrame(loop);
</script>
